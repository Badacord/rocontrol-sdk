name: Bug report
description: Report a problem with the RoControl Roblox SDK
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Do **not** include API keys or secrets.
  - type: input
    id: version
    attributes:
      label: SDK version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Install method
      options: [Wally, Model file (.rbxm), Source/Rojo]
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include the error kind/message and any redacted logs.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
