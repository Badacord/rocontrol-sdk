name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "llms.txt"
      - ".github/workflows/docs.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The docs are plain Markdown today. This job publishes the docs/ folder to
      # GitHub Pages; swap in VitePress/Docusaurus build steps when the docs site
      # gains a generator (tracked in docs/public-roadmap.md).
      - uses: actions/configure-pages@v5
        with:
          # Auto-create the Pages site on first run if it isn't enabled yet.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
